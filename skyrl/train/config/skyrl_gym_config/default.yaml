# @package environment.skyrl_gym
# number of background workers for env step calls. Set to 0 to disable background workers.
max_env_workers: 32

text2sql:
  db_path: "/home/ray/default/sql_data"

llm_as_a_judge:
  model: "gpt-4o-mini"
  base_url: null  # or a local endpoint: http://localhost:8000/v1

search:
  log_requests: false
  search_url: "http://127.0.0.1:8000/retrieve"
  topk: 3
  timeout: 30

babyai_text:
  env_name: "BabyAI-GoToLocal-v0"  # Default BabyAI environment
  env_kwargs: {}                    # kwargs forwarded to gym.make(...), e.g. room_size, num_dists
  max_steps: 64                     # Maximum steps per episode
  language: "english"               # Language for text observations (english/french)
  render_mode: null                 # Set to "human" for visualization during debugging
